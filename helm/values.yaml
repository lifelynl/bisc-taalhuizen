settings:
  registryBase: lifely
  replicaCount: 1
  name: bisc
  env: staging
  version: '0.1.0' #${GIT_COMMIT_HASH}
  domain: bisc-staging.lifely.nl
  nodeEnv: production
  subpath: ''

letsEncrypt:
  host: bisc-staging.lifely.nl
  email: ops@lifely.nl

security:
  pepper: '6559410638cb76176e1d0202aabb9ebf3faca2c0cb421131e9a7e535a8ddb011'
  secret: '101d5966aa1f412ae62fefe98fbf3d1c856aa7b123a71242a12b154761b3e607'
