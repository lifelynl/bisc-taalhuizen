apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.settings.name }}-backend
  labels:
    app.kubernetes.io/name: {{ .Values.settings.name }}-backend
    app.kubernetes.io/part-of: {{ .Values.settings.name }}
    helm.sh/chart: {{ include "chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.settings.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.settings.name }}-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.settings.name }}-backend
        app.kubernetes.io/part-of: {{ .Values.settings.name }}
        helm.sh/chart: {{ include "chart" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
    spec:
      containers:
        - name: {{ .Values.settings.name }}-backend
          image: "{{ .Values.settings.registryBase }}/{{ .Values.settings.projectName }}-backend:{{ .Values.settings.version }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 9000
          env:
            #General configmap values
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ template "fullname" . }}
                  key: app-name
            - name: APP_VERSION
              valueFrom:
                - configMapKeyRef:
                    name: {{ template "fullname" . }}
                    key: version
            - name: ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ template "fullname" . }}
                  key: app-env
            - name: APP_SERVER_URL
              valueFrom:
                - configMapKeyRef:
                    name: {{ template "fullname" . }}
                    key: server-url
            - name: APP_CLIENT_URL
              valueFrom:
                - configMapKeyRef:
                    name: {{ template "fullname" . }}
                    key: client-url
            - name: NODE_ENV
              valueFrom:
                - configMapKeyRef:
                    name: {{ template "fullname" . }}
                    key: node-env

            #General secret values
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  - name: {{ template "fullname" . }}
            - name: APP_PEPPER
              valueFrom:
                secretKeyRef:
                  name: {{ template "fullname" . }}
                  key: pepper
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ template "fullname" . }}
                  key: secret
            - name: SENTRY_DNS
              valueFrom:
                secretKeyRef:
                  name: {{ template "fullname" . }}
                  key: sentry-dns

            #Mail configmap values
            - name: MAIL
              valueFrom:
                configMapKeyRef: {{ template "fullname" . }}
                key: mail
            - name: MAIL_FROM_NAME
              valueFrom:
                configMapKeyRef: {{ template "fullname" . }}
                key: mail-from-name
            - name: MAIL_FROM_EMAIL
              valueFrom:
                configMapKeyRef: {{ template "fullname" . }}
                key: mail-from-email
            - name: MAIL_SMTP_HOST
              valueFrom:
                configMapKeyRef: {{ template "fullname" . }}
                key: mail-host
            - name: MAIL_SMTP_PORT
              valueFrom:
                configMapKeyRef: {{ template "fullname" . }}
                key: mail-port

            #Mail secret values
            - name: MAIL_SMTP_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ template "fullname" . }}
                  key: mail-username
            - name: MAIL_SMTP_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ template "fullname" . }}
                  key: mail-password

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}