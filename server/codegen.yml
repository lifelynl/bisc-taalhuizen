overwrite: true

generates:
    src/generated/person-introspection-result.json:
        schema:
            - https://taalhuizen-bisc.commonground.nu/api/v1/cc/graphql:
                  headers:
                      Authorization: b820b925-b4c3-4d48-8035-248ccc628ea7
        plugins:
            - fragment-matcher
    src/generated/person-graphql.tsx:
        schema:
            - https://taalhuizen-bisc.commonground.nu/api/v1/cc/graphql:
                  headers:
                      Authorization: b820b925-b4c3-4d48-8035-248ccc628ea7
        plugins:
            - 'typescript'
            - 'typescript-operations'
            - 'typescript-react-apollo'
        config:
            withHooks: true
            withMutationFn: false
            withComponent: false
            withHOC: false
            scalars:
                DateTime: Date
                Date: Date
                JSON: Record<string, unknown>
    src/generated/user-introspection-result.json:
